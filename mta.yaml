_schema-version: 3.3.0
ID: purchaseorder
description: A simple CAP project.
version: 1.0.0
modules:
- name: purchaseorder-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: purchaseorder-auth
  - name: purchaseorder-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: purchaseorder-destination-content
  type: com.sap.application.content
  requires:
  - name: purchaseorder-destination
    parameters:
      content-target: true
  - name: srv-api
  - name: purchaseorder_html_repo_host
    parameters:
      service-key:
        name: purchaseorder_html_repo_host-key
  - name: purchaseorder-auth
    parameters:
      service-key:
        name: purchaseorder-auth-key
  parameters:
    content:
      instance:
        destinations:
        - Name: visionpurchaseorder_purchaseorder_html_repo_host
          ServiceInstanceName: purchaseorder-html5-app-host-service
          ServiceKeyName: purchaseorder_html_repo_host-key
          sap.cloud.service: visionpurchaseorder
        - Authentication: OAuth2UserTokenExchange
          Name: visionpurchaseorder_purchaseorder_auth
          ServiceInstanceName: purchaseorder-auth
          ServiceKeyName: purchaseorder-auth-key
        - Name: srv-api
          Authentication: OAuth2UserTokenExchange
          ServiceInstanceName: purchaseorder-auth
          ServiceKeyName: purchaseorder-auth-key
          URL: ~{srv-api/srv-url}
        existing_destinations_policy: update
  build-parameters:
    no-source: true
- name: purchaseorder-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: purchaseorder_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - visionelectronicpurchaseorder.zip
      name: visionelectronicpurchaseorder
      target-path: resources/
- name: visionelectronicpurchaseorder
  type: html5
  path: app/visionelectronicpurchaseorder
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: purchaseorder-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      role-collections:
      - description: generated
        name: PurchaseorderAdmin (purchaseorder ${org}-${space})
        role-template-references:
        - $XSAPPNAME.PurchaseorderAdmin
      - description: generated
        name: Purchaseorderviewer (purchaseorder ${org}-${space})
        role-template-references:
        - $XSAPPNAME.Purchaseorderviewer
      tenant-mode: dedicated
      xsappname: purchaseorder-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: purchaseorder-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
    service: destination
    service-plan: lite
- name: purchaseorder_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: purchaseorder-html5-app-host-service
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
